name: Build

on: [push, pull_request]

jobs:
  build_wheels:
    name: Build manylinux x86_64 and aarch64 wheels
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Register QEMU emulation for arm64
        uses: docker/setup-qemu-action@v4
        with:
          platforms: linux/arm64

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Build wheels (manylinux x86_64 and aarch64)
        uses: pypa/cibuildwheel@v3.4.1
        with:
          package-dir: .
          output-dir: wheelhouse
          config-file: pyproject.toml
        env:
          # Build only manylinux wheels for the selected arches
          CIBW_BUILD: cp312-manylinux_*
          # Use container engine docker (default) and enable pinned dependency constraints
          CIBW_DEPENDENCY_CONSTRAINTS: pinned

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-manylinux
          path: ./wheelhouse/*.whl