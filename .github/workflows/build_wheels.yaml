name: Build

on: [push, pull_request]

jobs:
  build_wheels:
    name: Build manylinux aarch64 wheels
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Register QEMU emulation for arm64
        uses: docker/setup-qemu-action@v4
        with:
          platforms: linux/arm64

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Build wheels (manylinux aarch64)
        uses: pypa/cibuildwheel@v3.4.1
        with:
          package-dir: .
          output-dir: wheelhouse
          config-file: pyproject.toml
        env:
          # Force a single selected build for quick iteration
          CIBW_BUILD: cp312-manylinux_aarch64
          # Use container engine docker (default) and enable pinned dependency constraints
          CIBW_DEPENDENCY_CONSTRAINTS: pinned

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-aarch64
          path: ./wheelhouse/*.whl