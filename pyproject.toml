[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "gstreamer-opencv-wheel-builder"
version = "4.13.0"

[tool.cibuildwheel]
build = "cp312-*"  # Python 3.12 only
build-frontend = "pip"
before-all = """
set -eux

yum install -y gcc gcc-c++ make cmake pkgconfig git ninja-build \
    gtk2-devel gtk3-devel \
    gstreamer1-devel gstreamer1-plugins-base-devel \
    gstreamer1-plugins-good gstreamer1-plugins-bad-free gstreamer1-plugins-bad-free-devel
"""

[tool.cibuildwheel.linux]
archs = ["x86_64", "aarch64"]
environment = { CMAKE_ARGS = "-DWITH_GSTREAMER=ON -DWITH_GTK=ON" }