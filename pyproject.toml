[build-system]
requires = ["scikit-build-core>=0.10", "numpy>=1.26"]
build-backend = "scikit_build_core.build"

[project]
name = "gstreamer-opencv-wheel-builder"
version = "0.1.0"
description = "OpenCV with GStreamer support wheel builder for Raspberry Pi"
readme = "README.md"
requires-python = ">=3.12"
dependencies = ["numpy>=1.26"]

[tool.cibuildwheel]
build = "cp312-*"
archs = ["aarch64", "x86_64"]

before-all = """
set -eux

yum install -y gcc gcc-c++ make cmake pkgconfig git ninja-build \
    gtk2-devel gtk3-devel \
    gstreamer1-devel gstreamer1-plugins-base-devel \
    gstreamer1-plugins-good gstreamer1-plugins-bad-free \
    python3-devel

git clone --depth 1 --branch 4.13.0 https://github.com/opencv/opencv.git /tmp/opencv
"""

before-build = """
set -eux

pip install "numpy>=1.26"

PYBIN=$(which python)
PYINC=$($PYBIN -c "import sysconfig; print(sysconfig.get_path('include'))")
PYLIB=$($PYBIN -c "import sysconfig; print(sysconfig.get_config_var('LIBDIR'))")
NUMPY_INC=$($PYBIN -c "import numpy; print(numpy.get_include())")

rm -rf /tmp/opencv/build /tmp/cv2_staging
mkdir -p /tmp/cv2_staging

cmake -S /tmp/opencv -B /tmp/opencv/build -G Ninja \
  -D CMAKE_BUILD_TYPE=Release \
  -D CMAKE_INSTALL_PREFIX=/usr/local \
  -D WITH_GSTREAMER=ON \
  -D WITH_IPP=OFF \
  -D BUILD_SHARED_LIBS=ON \
  -D BUILD_TESTS=OFF \
  -D BUILD_PERF_TESTS=OFF \
  -D BUILD_EXAMPLES=OFF \
  -D BUILD_opencv_python3=ON \
  -D BUILD_opencv_python2=OFF \
  -D PYTHON3_EXECUTABLE=$PYBIN \
  -D PYTHON3_INCLUDE_DIR=$PYINC \
  -D PYTHON3_LIBRARIES=$PYLIB \
  -D PYTHON3_NUMPY_INCLUDE_DIRS=$NUMPY_INC \
  -D OPENCV_PYTHON3_INSTALL_PATH=/tmp/cv2_staging \
  -D BUILD_LIST=core,imgproc,videoio,imgcodecs,highgui,python3

echo "=== OpenCV Python detection ==="
grep -i python /tmp/opencv/build/CMakeCache.txt | grep -v "^//" | grep -v "^#"

echo "=== OpenCV modules to be built ==="
grep "BUILD_opencv" /tmp/opencv/build/CMakeCache.txt | grep -v "^//" | grep -v "^#"

cmake --build /tmp/opencv/build
cmake --install /tmp/opencv/build

echo "=== cv2 staging contents ==="
find /tmp/cv2_staging -type f

echo "=== searching for cv2 anywhere ==="
find / -name "cv2*.so" 2>/dev/null || true
"""

[tool.cibuildwheel.linux]
build-frontend = "pip"
environment = { LD_LIBRARY_PATH="/usr/local/lib:${LD_LIBRARY_PATH}" }
